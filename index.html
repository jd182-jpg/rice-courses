<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Rice Course Planner</title>
<style>*{margin:0;padding:0}</style>
</head>
<body>
<style>
  :root {
    --ink: #1E3A5F;
    --accent: #2F6FB3;
    --accent-soft: #E7F0FA;
    --bg: #F4F6F9;
    --surface: #FFFFFF;
    --surface-2: #FAFBFD;
    --border: #E0E5EC;
    --border-strong: #C9D1DC;
    --text: #1B2430;
    --muted: #5C6672;
    --faint: #8A94A2;
    --good: #2E7D57;
    --good-soft: #E4F2EA;
    --warn: #B5761F;
    --warn-soft: #F8EEDD;
    --bad: #C0392B;
    --bad-soft: #FbE9E7;
    --d1: #7A5C9E;   /* Humanities */
    --d1-soft: #EEE9F4;
    --d2: #2E8B8B;   /* Social Sciences */
    --d2-soft: #E2F1F1;
    --d3: #C08A2D;   /* Natural Sci / Eng */
    --d3-soft: #F6EEDD;
    --shadow: 0 1px 2px rgba(20,30,45,.06), 0 4px 16px rgba(20,30,45,.05);
    --radius: 10px;
    --radius-sm: 7px;
    --serif: ui-serif, Georgia, "Iowan Old Style", "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #A9C6EA;
      --accent: #5B9BE0;
      --accent-soft: #16283B;
      --bg: #0E131A;
      --surface: #161D26;
      --surface-2: #1A222D;
      --border: #29323E;
      --border-strong: #3A4552;
      --text: #E6EAF0;
      --muted: #9AA4B1;
      --faint: #6E7885;
      --good: #5CB98C;
      --good-soft: #13271D;
      --warn: #D9A441;
      --warn-soft: #2C2313;
      --bad: #E8776B;
      --bad-soft: #2E1714;
      --d1: #B79FD6; --d1-soft: #211B2C;
      --d2: #63C1C1; --d2-soft: #14282A;
      --d3: #DBB05C; --d3-soft: #2A2113;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 18px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --ink:#1E3A5F;--accent:#2F6FB3;--accent-soft:#E7F0FA;--bg:#F4F6F9;--surface:#FFFFFF;--surface-2:#FAFBFD;
    --border:#E0E5EC;--border-strong:#C9D1DC;--text:#1B2430;--muted:#5C6672;--faint:#8A94A2;
    --good:#2E7D57;--good-soft:#E4F2EA;--warn:#B5761F;--warn-soft:#F8EEDD;--bad:#C0392B;--bad-soft:#FBE9E7;
    --d1:#7A5C9E;--d1-soft:#EEE9F4;--d2:#2E8B8B;--d2-soft:#E2F1F1;--d3:#C08A2D;--d3-soft:#F6EEDD;
    --shadow:0 1px 2px rgba(20,30,45,.06),0 4px 16px rgba(20,30,45,.05);
  }
  :root[data-theme="dark"] {
    --ink:#A9C6EA;--accent:#5B9BE0;--accent-soft:#16283B;--bg:#0E131A;--surface:#161D26;--surface-2:#1A222D;
    --border:#29323E;--border-strong:#3A4552;--text:#E6EAF0;--muted:#9AA4B1;--faint:#6E7885;
    --good:#5CB98C;--good-soft:#13271D;--warn:#D9A441;--warn-soft:#2C2313;--bad:#E8776B;--bad-soft:#2E1714;
    --d1:#B79FD6;--d1-soft:#211B2C;--d2:#63C1C1;--d2-soft:#14282A;--d3:#DBB05C;--d3-soft:#2A2113;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 18px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans);
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  h1,h2,h3 { font-family: var(--serif); font-weight: 600; margin: 0; text-wrap: balance; letter-spacing: -.01em; }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .app { max-width: 1180px; margin: 0 auto; padding: 0 18px 80px; }

  /* Masthead */
  .masthead { padding: 22px 0 14px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand h1 { font-size: 25px; color: var(--ink); }
  .brand .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 3px; }
  .theme-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    border-radius: 20px; padding: 6px 13px; font-size: 12.5px; display: inline-flex; gap: 6px; align-items: center; }
  .theme-btn:hover { border-color: var(--border-strong); color: var(--text); }

  /* Summary bar */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow); }
  .stat .label { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--faint); margin-bottom: 4px; }
  .stat .value { font-family: var(--serif); font-size: 22px; color: var(--text); line-height: 1.1; }
  .stat .value small { font-size: 13px; color: var(--muted); font-family: var(--sans); }
  .stat .sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .div-mini { display: flex; gap: 6px; margin-top: 6px; }
  .div-mini .chip { flex: 1; text-align: center; border-radius: 5px; padding: 3px 0; font-size: 10.5px;
    font-family: var(--mono); border: 1px solid transparent; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin: 18px 0 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab { background: none; border: none; padding: 9px 15px; color: var(--muted); font-size: 14px;
    border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 600; }

  /* Generic */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .btn { background: var(--accent); color: #fff; border: 1px solid var(--accent); border-radius: var(--radius-sm);
    padding: 7px 13px; font-weight: 500; font-size: 13.5px; }
  .btn:hover { filter: brightness(1.06); }
  .btn.ghost { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .btn.ghost:hover { background: var(--surface-2); }
  .btn.sm { padding: 4px 9px; font-size: 12px; }
  .btn.danger { background: var(--surface); color: var(--bad); border-color: var(--border); }
  .btn.danger:hover { background: var(--bad-soft); border-color: var(--bad); }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .spread { justify-content: space-between; }
  input, select, textarea { font-family: var(--sans); font-size: 14px; color: var(--text);
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 7px 9px; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  textarea { width: 100%; resize: vertical; font-family: var(--mono); font-size: 12.5px; line-height: 1.55; }
  label.field { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .hint { color: var(--muted); font-size: 12.5px; }
  .lead { color: var(--muted); font-size: 13.5px; max-width: 62ch; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-family: var(--mono); border: 1px solid var(--border); background: var(--surface-2); color: var(--muted); }
  .pill.good { background: var(--good-soft); color: var(--good); border-color: transparent; }
  .pill.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
  .pill.bad { background: var(--bad-soft); color: var(--bad); border-color: transparent; }
  .tag-d1 { background: var(--d1-soft); color: var(--d1); }
  .tag-d2 { background: var(--d2-soft); color: var(--d2); }
  .tag-d3 { background: var(--d3-soft); color: var(--d3); }
  .empty { text-align: center; padding: 34px 16px; color: var(--muted); }
  .empty h3 { color: var(--text); margin-bottom: 6px; }

  /* Plan */
  .plan-scroll { overflow-x: auto; padding-bottom: 10px; }
  .terms { display: flex; gap: 14px; align-items: flex-start; min-width: min-content; }
  .term { flex: 0 0 258px; }
  .term-head { padding: 11px 13px; border-bottom: 1px solid var(--border); }
  .term-head .tname { font-family: var(--serif); font-size: 16px; }
  .term-body { padding: 10px 11px; display: flex; flex-direction: column; gap: 8px; min-height: 40px; }
  .ccard { border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-sm);
    padding: 8px 9px; background: var(--surface-2); position: relative; }
  .ccard.conflict { border-left-color: var(--bad); background: var(--bad-soft); }
  .ccard .code { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--ink); }
  .ccard .ct { font-size: 12.5px; color: var(--text); margin: 1px 0 4px; line-height: 1.3; }
  .ccard .meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .ccard .x { position: absolute; top: 6px; right: 6px; border: none; background: none; color: var(--faint);
    font-size: 15px; line-height: 1; padding: 2px; border-radius: 4px; }
  .ccard .x:hover { color: var(--bad); background: var(--bad-soft); }
  .term-foot { padding: 9px 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .credit-tot { font-family: var(--mono); font-size: 13px; }
  .term-warn { font-size: 11.5px; padding: 6px 12px; border-top: 1px dashed var(--border); }

  /* Week grid */
  .weekwrap { overflow-x: auto; }
  .grid { display: grid; grid-template-columns: 52px repeat(var(--ndays,5), minmax(96px,1fr)); position: relative; min-width: 560px; }
  .grid .corner, .grid .dayhead { position: sticky; top: 0; background: var(--surface); z-index: 3;
    border-bottom: 1px solid var(--border-strong); padding: 7px 4px; text-align: center; font-size: 12.5px; font-weight: 600; }
  .gridbody { position: relative; }
  .hourrow { display: grid; grid-template-columns: 52px repeat(var(--ndays,5), minmax(96px,1fr)); }
  .hourlabel { font-family: var(--mono); font-size: 10.5px; color: var(--faint); text-align: right; padding: 0 6px;
    border-right: 1px solid var(--border); transform: translateY(-6px); height: 48px; }
  .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 48px; }
  .cell:nth-child(2) { border-left: 1px solid var(--border); }
  .events { position: absolute; top: 0; left: 52px; right: 0; bottom: 0; display: grid;
    grid-template-columns: repeat(var(--ndays,5), 1fr); pointer-events: none; }
  .daycol { position: relative; }
  .ev { position: absolute; left: 3px; right: 3px; border-radius: 6px; padding: 4px 6px; overflow: hidden;
    background: var(--accent-soft); border: 1px solid var(--accent); color: var(--ink); pointer-events: auto; }
  .ev.conflict { background: var(--bad-soft); border-color: var(--bad); color: var(--bad); }
  .ev .evc { font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .ev .evt { font-size: 10.5px; line-height: 1.2; }
  .ev .evm { font-family: var(--mono); font-size: 9.5px; opacity: .8; }
  .freeday-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .freeday { padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 12.5px; }
  .freeday.free { background: var(--good-soft); border-color: transparent; color: var(--good); font-weight: 600; }
  .freeday.busy { background: var(--surface-2); color: var(--muted); }

  /* Requirements */
  .reqgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 12px; }
  .reqcard { padding: 14px 15px; }
  .reqcard .rtop { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .reqcard h3 { font-size: 15.5px; }
  .bar { height: 8px; border-radius: 5px; background: var(--border); overflow: hidden; margin: 9px 0 6px; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 5px; transition: width .3s; }
  .bar.done > i { background: var(--good); }
  .bar.d1 > i { background: var(--d1); } .bar.d2 > i { background: var(--d2); } .bar.d3 > i { background: var(--d3); }
  .reqmeta { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
  .matched-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

  /* Catalog */
  .catrow { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 11px 13px; border-bottom: 1px solid var(--border); align-items: center; }
  .catrow:last-child { border-bottom: none; }
  .catrow .code { font-family: var(--mono); font-weight: 600; color: var(--ink); font-size: 13px; }
  .catrow .title { font-size: 13.5px; }
  .catrow .subm { font-size: 11.5px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .divtoggle { border: 1px solid var(--border-strong); background: var(--surface); border-radius: 5px;
    padding: 2px 7px; font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .divtoggle.on1 { background: var(--d1-soft); color: var(--d1); border-color: var(--d1); }
  .divtoggle.on2 { background: var(--d2-soft); color: var(--d2); border-color: var(--d2); }
  .divtoggle.on3 { background: var(--d3-soft); color: var(--d3); border-color: var(--d3); }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(15,20,28,.55); display: flex; align-items: center;
    justify-content: center; z-index: 50; padding: 18px; }
  .modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
    max-width: 540px; width: 100%; max-height: 86vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .modal-head { padding: 15px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); }
  .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .picklist { display: flex; flex-direction: column; gap: 6px; max-height: 46vh; overflow: auto; }
  .pickitem { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .pickitem:hover { border-color: var(--accent); background: var(--surface-2); }

  .section-title { display: flex; align-items: baseline; gap: 10px; margin: 4px 0 12px; }
  .section-title h2 { font-size: 18px; color: var(--ink); }
  .divlegend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
  details.help { margin-top: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 12px; background: var(--surface-2); }
  details.help summary { cursor: pointer; padding: 8px 0; font-weight: 600; color: var(--ink); font-size: 13.5px; }
  details.help ul { margin: 4px 0 12px; padding-left: 18px; color: var(--muted); font-size: 13px; }
  details.help li { margin: 4px 0; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff;
    padding: 9px 16px; border-radius: 20px; font-size: 13px; z-index: 80; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<div class="app">
  <header class="masthead">
    <div class="brand">
      <div class="kicker">Rice University · Degree &amp; Schedule Planner</div>
      <h1 id="brandTitle">Course Planner</h1>
    </div>
    <button class="theme-btn" data-action="toggle-theme">◐ Theme</button>
  </header>

  <div id="summary" class="summary"></div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="plan">Plan</button>
    <button class="tab" data-tab="week">Week</button>
    <button class="tab" data-tab="req">Requirements</button>
    <button class="tab" data-tab="catalog">Catalog</button>
    <button class="tab" data-tab="data">Data</button>
  </nav>

  <main id="view"></main>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
"use strict";

/* ---------------- Constants ---------------- */
const DAY_CODES = ["M","T","W","R","F","S","U"];
const DAY_NAMES = {M:"Mon", T:"Tue", W:"Wed", R:"Thu", F:"Fri", S:"Sat", U:"Sun"};
const DIVISIONS = [
  {id:"D1", name:"Humanities", cls:"d1"},
  {id:"D2", name:"Social Sciences", cls:"d2"},
  {id:"D3", name:"Natural Sciences & Engineering", cls:"d3"},
];
const STORAGE_KEY = "riceCoursePlanner.v1";
const GRID_START = 8*60;   // 8:00 AM
const GRID_END = 21*60;    // 9:00 PM
const PX_PER_MIN = 48/60;  // 48px per hour

/* ---------------- Default seed data ---------------- */
function seedState() {
  const catalog = {};
  [
    {crn:"15079", subject:"BUSI", number:"215", section:"001", title:"LEADING ACROSS SOCIAL DIVIDES",
     instructor:"Jun, Sora", credits:3, partOfTerm:"Full Term",
     meetings:[{days:["M","W"], start:16*60, end:17*60+15}], divisions:[], tags:[]},
    {crn:"12696", subject:"BUSI", number:"221", section:"001", title:"NEW ENTERPRISES: DISCOVERY",
     instructor:"Panahi, Hesam", credits:3, partOfTerm:"Full Term",
     meetings:[{days:["T","R"], start:13*60, end:14*60+15}], divisions:[], tags:[]},
    {crn:"13201", subject:"BUSI", number:"224", section:"001", title:"BIAS AND MEDICAL DEVICE DESIGN",
     instructor:"Abidi, Sabia; Panahi, Hesam", credits:1, partOfTerm:"Full Term",
     meetings:[{days:["M"], start:13*60, end:13*60+50}], divisions:[], tags:[]},
  ].forEach(c => catalog[c.crn] = c);

  return {
    student: { name:"", majors:"", classYear:"Junior", creditsNeeded:120 },
    terms: [
      {id:uid(), name:"Fall 2026", targetCredits:15, courseCrns:["15079","12696"]},
      {id:uid(), name:"Spring 2027", targetCredits:15, courseCrns:[]},
      {id:uid(), name:"Fall 2027", targetCredits:15, courseCrns:[]},
      {id:uid(), name:"Spring 2028", targetCredits:15, courseCrns:[]},
    ],
    catalog,
    transcript: [],
    divisionTargets: { D1:12, D2:12, D3:12 },
    requirements: [
      {id:uid(), name:"Total credit hours", kind:"credits", need:120, match:{any:true}},
    ],
    ui: { tab:"plan", weekTermId:null }
  };
}

/* ---------------- State / persistence ---------------- */
let state;
let _ctr = 0;
function uid(){ _ctr += 1; return "id" + Date.now().toString(36) + "-" + _ctr.toString(36); }

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { state = JSON.parse(raw); migrate(); return; }
  } catch(e){ console.warn("load failed", e); }
  state = seedState();
}
function migrate(){
  state.student = state.student || { name:"", majors:"", classYear:"Junior", creditsNeeded:120 };
  if (!state.student.creditsNeeded) state.student.creditsNeeded = 120;
  state.terms = state.terms || [];
  state.catalog = state.catalog || {};
  state.transcript = state.transcript || [];
  state.divisionTargets = state.divisionTargets || { D1:12, D2:12, D3:12 };
  state.requirements = state.requirements || [];
  state.ui = state.ui || { tab:"plan", weekTermId:null };
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){ toast("Could not save locally"); } }

/* ---------------- Helpers ---------------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function fmtTime(min){
  if(min==null) return "";
  let h=Math.floor(min/60), m=min%60, ap=h>=12?"PM":"AM"; let hh=h%12; if(hh===0)hh=12;
  return hh + ":" + String(m).padStart(2,"0") + ap;
}
function courseCode(c){ return c.subject + " " + c.number + (c.section ? " " + c.section : ""); }
function meetingStr(c){
  if(!c.meetings || !c.meetings.length) return "TBA / no set time";
  return c.meetings.map(mt => (mt.days||[]).join("") + " " + fmtTime(mt.start) + "–" + fmtTime(mt.end)).join(", ");
}
function num(v, d){ const n=parseFloat(v); return isNaN(n)?(d||0):n; }
function toast(msg){
  const r=document.getElementById("toastRoot"); r.innerHTML="";
  const t=el('<div class="toast">'+esc(msg)+'</div>'); r.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.remove(); }, 2600);
}

/* transcript passing credits */
function isPassing(grade){
  if(!grade) return true;
  const g=String(grade).trim().toUpperCase();
  return !["F","W","INC","U","NP","FAIL"].includes(g);
}
function earnedCredits(){
  return state.transcript.reduce((s,t)=> s + (isPassing(t.grade)? num(t.credits):0), 0);
}
function plannedCourses(){
  const list=[];
  state.terms.forEach(term=>{
    (term.courseCrns||[]).forEach(crn=>{ const c=state.catalog[crn]; if(c) list.push({term, course:c}); });
  });
  return list;
}
function plannedCredits(){
  return plannedCourses().reduce((s,x)=> s + num(x.course.credits), 0);
}
function termCredits(term){
  return (term.courseCrns||[]).reduce((s,crn)=>{ const c=state.catalog[crn]; return s + (c?num(c.credits):0); },0);
}

/* Division credits from transcript + planned */
function divisionCredits(divId){
  let total=0;
  state.transcript.forEach(t=>{ if((t.divisions||[]).includes(divId) && isPassing(t.grade)) total+=num(t.credits); });
  plannedCourses().forEach(x=>{ if((x.course.divisions||[]).includes(divId)) total+=num(x.course.credits); });
  return total;
}

/* Conflict detection within a term: returns Set of crns in conflict */
function termConflicts(term){
  const bad=new Set();
  const crns=(term.courseCrns||[]).filter(crn=>state.catalog[crn]);
  for(let i=0;i<crns.length;i++){
    for(let j=i+1;j<crns.length;j++){
      if(coursesOverlap(state.catalog[crns[i]], state.catalog[crns[j]])){ bad.add(crns[i]); bad.add(crns[j]); }
    }
  }
  return bad;
}
function coursesOverlap(a,b){
  for(const ma of (a.meetings||[])) for(const mb of (b.meetings||[])){
    if(ma.start==null||mb.start==null) continue;
    const shared=(ma.days||[]).some(d=>(mb.days||[]).includes(d));
    if(shared && ma.start < mb.end && mb.start < ma.end) return true;
  }
  return false;
}

/* ---------------- Parser: courses.rice.edu blocks ---------------- */
function parseDays(str){
  const out=[]; const s=str.toUpperCase();
  for(const ch of s){ if(DAY_CODES.includes(ch)) out.push(ch); }
  return out;
}
function parseClock(str){
  const m=str.trim().match(/(\d{1,2}):(\d{2})\s*([AP])M/i);
  if(!m) return null;
  let h=parseInt(m[1],10); const min=parseInt(m[2],10); const ap=m[3].toUpperCase();
  if(ap==="P" && h!==12) h+=12; if(ap==="A" && h===12) h=0;
  return h*60+min;
}
function parseMeetingLine(val){
  // e.g. "4:00PM - 5:15PM MW"  or "1:00PM - 1:50PM M"
  const m=val.match(/(\d{1,2}:\d{2}\s*[AP]M)\s*[-–]\s*(\d{1,2}:\d{2}\s*[AP]M)\s*([MTWRFSU]+)/i);
  if(!m) return null;
  return { start:parseClock(m[1]), end:parseClock(m[2]), days:parseDays(m[3]) };
}
function parseCourseCode(val){
  const m=val.trim().match(/^([A-Z]{2,5})\s*(\d{2,3}[A-Z]?)\s*(\d{2,3}[A-Z]?)?/i);
  if(!m) return {subject:val.trim(), number:"", section:""};
  return { subject:(m[1]||"").toUpperCase(), number:m[2]||"", section:m[3]||"" };
}
function parsePaste(text){
  const lines=text.split(/\r?\n/);
  const records=[]; let cur=null; let lastField=null;
  const push=()=>{ if(cur) records.push(cur); };
  for(let raw of lines){
    const line=raw.trim(); if(!line) continue;
    const cm=line.match(/^(CRN|Course|Part of Term|Title|Instructor\(s\)|Instructors?|Meeting|Credits?)\s*:\s*(.*)$/i);
    if(cm){
      const key=cm[1].toLowerCase(); const val=cm[2].trim();
      if(key==="crn"){ push(); cur={crn:val.replace(/\D/g,"")||val, subject:"",number:"",section:"",title:"",instructor:"",credits:0,partOfTerm:"",meetings:[],divisions:[],tags:[]}; lastField="crn"; continue; }
      if(!cur){ cur={crn:"", subject:"",number:"",section:"",title:"",instructor:"",credits:0,partOfTerm:"",meetings:[],divisions:[],tags:[]}; }
      if(key==="course"){ const pc=parseCourseCode(val); cur.subject=pc.subject; cur.number=pc.number; cur.section=pc.section; lastField="course"; }
      else if(key==="part of term"){ cur.partOfTerm=val; lastField="part"; }
      else if(key==="title"){ cur.title=val; lastField="title"; }
      else if(key.startsWith("instructor")){ cur.instructor=val; lastField="instructor"; }
      else if(key==="meeting"){ const mt=parseMeetingLine(val); if(mt) cur.meetings.push(mt); lastField="meeting"; }
      else if(key.startsWith("credit")){ cur.credits=num(val); lastField="credits"; }
      continue;
    }
    // continuation line (e.g. second instructor, or CRN heading like "CRN 15079")
    if(cur){
      if(lastField==="instructor"){ cur.instructor += (cur.instructor?"; ":"") + line; }
      else if(lastField==="title"){ cur.title += " " + line; }
      else if(lastField==="meeting"){ const mt=parseMeetingLine(line); if(mt) cur.meetings.push(mt); }
    }
  }
  push();
  return records.filter(r=> r.crn || r.subject);
}

/* transcript paste: tolerant line parser */
function parseTranscript(text){
  const out=[];
  text.split(/\r?\n/).forEach(raw=>{
    const line=raw.trim(); if(!line) return;
    const m=line.match(/^([A-Z]{2,5})\s*(\d{2,3}[A-Z]?)\b(.*)$/i);
    if(!m) return;
    const rest=(m[3]||"").trim();
    // find a credits number (integer or .5) and an optional grade token
    const credM=rest.match(/(\d(?:\.\d)?)\s*(?:cr|credit|hrs?)?\b/i);
    const gradeM=rest.match(/\b([A-D][+-]?|F|P|S|CR|W|INC|TR)\b\s*$/i);
    let title=rest;
    if(credM) title=title.replace(credM[0],"").trim();
    if(gradeM) title=title.replace(new RegExp(gradeM[0]+"$"),"").trim();
    title=title.replace(/\s{2,}/g," ").replace(/[|,]+$/,"").trim();
    out.push({ id:uid(), subject:m[1].toUpperCase(), number:m[2], title:title||"", credits: credM?num(credM[1]):3, grade: gradeM?gradeM[1].toUpperCase():"", divisions:[] });
  });
  return out;
}

const view=document.getElementById("view");
function render(){
  renderSummary();
  document.querySelectorAll(".tab").forEach(t=> t.classList.toggle("active", t.dataset.tab===state.ui.tab));
  const title=state.student.name ? (state.student.name.split(/\s+/)[0] + "’s Plan") : "Course Planner";
  document.getElementById("brandTitle").textContent=title;
  const map={plan:renderPlan, week:renderWeek, req:renderReq, catalog:renderCatalog, data:renderData};
  view.innerHTML=""; (map[state.ui.tab]||renderPlan)();
  save();
}

function renderSummary(){
  const earned=earnedCredits(), planned=plannedCredits(), need=num(state.student.creditsNeeded,120);
  const remaining=Math.max(0, need - earned - planned);
  // projected graduation = last term that still has planned courses / where cumulative reaches need
  let gradTerm="—", cum=earned;
  for(const term of state.terms){ const tc=termCredits(term); if(tc>0){ cum+=tc; gradTerm=term.name; if(cum>=need) { gradTerm=term.name; break; } } }
  const totalConflicts=state.terms.reduce((s,t)=> s+termConflicts(t).size,0);

  const divMini=DIVISIONS.map(d=>{
    const have=divisionCredits(d.id), tgt=num(state.divisionTargets[d.id],0);
    const ok=tgt>0 && have>=tgt;
    return '<span class="chip tag-'+d.cls+'" title="'+esc(d.name)+'">'+d.id+' '+have+'/'+tgt+(ok?' ✓':'')+'</span>';
  }).join("");

  document.getElementById("summary").innerHTML = `
    <div class="stat"><div class="label">Credits earned</div>
      <div class="value mono">${earned}<small> / ${need}</small></div>
      <div class="sub">from transcript</div></div>
    <div class="stat"><div class="label">Planned ahead</div>
      <div class="value mono">${planned}</div>
      <div class="sub">${plannedCourses().length} courses across ${state.terms.filter(t=>termCredits(t)>0).length} terms</div></div>
    <div class="stat"><div class="label">Still needed</div>
      <div class="value mono">${remaining}</div>
      <div class="sub">${remaining===0?'requirement met ✓':'after current plan'}</div></div>
    <div class="stat"><div class="label">On track to finish</div>
      <div class="value" style="font-size:19px">${esc(gradTerm)}</div>
      <div class="sub">${totalConflicts>0?'<span style="color:var(--bad)">'+totalConflicts+' time conflict(s)</span>':'no time conflicts'}</div></div>
    <div class="stat"><div class="label">Division progress</div>
      <div class="div-mini">${divMini}</div>
      <div class="sub">D1 / D2 / D3 credits</div></div>`;
}

      const c=state.catalog[crn]; if(!c){ return; }
      const conf=conflicts.has(crn);
      const cc=el('<div class="ccard'+(conf?' conflict':'')+'"></div>');
      cc.innerHTML=`<button class="x" title="Remove">×</button>
        <div class="code">${esc(courseCode(c))}</div>
        <div class="ct">${esc(c.title)}</div>
        <div class="meta">
          <span class="pill mono">${num(c.credits)} cr</span>

          ${(c.divisions||[]).map(d=>'<span class="pill tag-'+d.toLowerCase()+'">'+d+'</span>').join("")}

    foot.innerHTML=`<span class="credit-tot"><b>${tc}</b> <span class="hint">/ ${tgt} cr</span> ${loadPill}</span>`;

    terms.appendChild(card);

  const days=DAY_CODES.filter(d=>used.has(d));

  const grid=el('<div class="card weekwrap" style="padding:10px"></div>');
  const g=el('<div class="grid" style="--ndays:'+days.length+'"></div>');
  g.appendChild(el('<div class="corner"></div>'));
  days.forEach(d=> g.appendChild(el('<div class="dayhead">'+DAY_NAMES[d]+'</div>')));

  const gb=el('<div class="gridbody" style="grid-column:1 / -1; position:relative"></div>');
  const hours=(GRID_END-GRID_START)/60;
  for(let h=0;h<hours;h++){
    const row=el('<div class="hourrow" style="--ndays:'+days.length+'"></div>');
    row.appendChild(el('<div class="hourlabel">'+fmtTime(GRID_START+h*60)+'</div>'));
    days.forEach(()=> row.appendChild(el('<div class="cell"></div>')));
    gb.appendChild(row);
  }
  // events overlay
  const ev=el('<div class="events" style="--ndays:'+days.length+'"></div>');
  const cols={}; days.forEach(d=>{ const c=el('<div class="daycol"></div>'); cols[d]=c; ev.appendChild(c); });
  (term.courseCrns||[]).forEach(crn=>{
    const c=state.catalog[crn]; if(!c) return; const conf=conflicts.has(crn);
    (c.meetings||[]).forEach(m=>{
      if(m.start==null) return;
      (m.days||[]).forEach(d=>{
        if(!cols[d]) return;
        const top=(m.start-GRID_START)*PX_PER_MIN;
        const height=Math.max(20,(m.end-m.start)*PX_PER_MIN);
        const b=el('<div class="ev'+(conf?' conflict':'')+'"></div>');
        b.style.top=top+"px"; b.style.height=height+"px";
        b.innerHTML='<div class="evc">'+esc(courseCode(c))+'</div><div class="evt">'+esc(c.title)+'</div><div class="evm">'+fmtTime(m.start)+'–'+fmtTime(m.end)+'</div>';
        b.title=courseCode(c)+" — "+c.title;
        cols[d].appendChild(b);
      });
    });
  });
  gb.appendChild(ev);
  g.appendChild(gb);
  grid.appendChild(g);
  wrap.appendChild(grid);

  // Free-day summary (for working)
  const busyDays=new Set();
  (term.courseCrns||[]).forEach(crn=>{ const c=state.catalog[crn]; if(c)(c.meetings||[]).forEach(m=>(m.days||[]).forEach(d=>busyDays.add(d))); });
  const weekdays=["M","T","W","R","F"];
  const freeRow=el('<div></div>');
  freeRow.appendChild(el('<div class="section-title" style="margin-top:18px"><h2 style="font-size:15px">Days free for work</h2><span class="hint">Weekdays with no class — useful for planning office time</span></div>'));
  const fr=el('<div class="freeday-row"></div>');
  weekdays.forEach(d=>{
    const free=!busyDays.has(d);
    fr.appendChild(el('<div class="freeday '+(free?'free':'busy')+'">'+DAY_NAMES[d]+' · '+(free?'Free':'In class')+'</div>'));
  });
  freeRow.appendChild(fr);
  wrap.appendChild(freeRow);
  view.appendChild(wrap);
}

function describeMatch(m){
  if(!m) return "all courses"; if(m.any) return "any course";
  const parts=[];
  if(m.subjects&&m.subjects.length) parts.push(m.subjects.join("/"));
  if(m.divisions&&m.divisions.length) parts.push(m.divisions.join("/"));
  if(m.courses&&m.courses.length) parts.push(m.courses.length+" specific");
  return parts.join(" · ")||"all courses";
}
function evalRequirement(r){
  const m=r.match||{}; const items=[]; let credits=0, count=0;
  const consider=(subject,number,cr,divisions,labelSuffix)=>{
    const code=subject+" "+number;
    let ok=false;
    if(m.any) ok=true;
    if(!ok && m.subjects && m.subjects.map(s=>s.toUpperCase()).includes((subject||"").toUpperCase())) ok=true;
    if(!ok && m.courses && m.courses.map(c=>c.replace(/\s+/g,"").toUpperCase()).includes((subject+number).replace(/\s+/g,"").toUpperCase())) ok=true;
    if(!ok && m.divisions && m.divisions.some(d=>(divisions||[]).includes(d))) ok=true;
    if(ok){ items.push(code+(labelSuffix||"")); credits+=num(cr); count+=1; }
  };
  state.transcript.forEach(t=>{ if(isPassing(t.grade)) consider(t.subject,t.number,t.credits,t.divisions," ✓"); });
  plannedCourses().forEach(x=>{ const c=x.course; consider(c.subject,c.number,c.credits,c.divisions,""); });
  return { have: r.kind==='courses'?count:credits, need:num(r.need), items };
}

  const pb=el('<div class="row" style="margin-top:10px"></div>');
  pb.appendChild(mkBtn("Import courses","btn",()=>{
    const txt=document.getElementById("pasteBox").value;

    document.getElementById("pasteBox").value="";
    toast(added+" course(s) imported"); render();
  }));
  pb.appendChild(el('<span class="hint">You can paste many at once. Re-importing updates a course and keeps its division tags.</span>'));
  paster.appendChild(pb);
  wrap.appendChild(paster);

  // search + list
  const cat=Object.values(state.catalog).sort((a,b)=> courseCode(a).localeCompare(courseCode(b)));
  const bar=el('<div class="row spread" style="margin-bottom:8px"></div>');
  bar.appendChild(el('<input id="catSearch" placeholder="Search code, title, instructor…" style="flex:1;min-width:200px">'));
  bar.appendChild(el('<span class="hint">'+cat.length+' course(s)</span>'));
  wrap.appendChild(bar);

  const list=el('<div class="card"></div>');
  if(!cat.length) list.appendChild(el('<div class="empty"><h3>Catalog is empty</h3><div>Paste some course listings above to get started.</div></div>'));
  const renderList=(q)=>{
    list.querySelectorAll('.catrow').forEach(n=>n.remove());
    const ql=(q||"").toLowerCase();
    const shown=cat.filter(c=> !ql || (courseCode(c)+" "+c.title+" "+c.instructor).toLowerCase().includes(ql));
    shown.forEach(c=>{
      const row=el('<div class="catrow"></div>');
      const left=el('<div></div>');
      left.innerHTML=`<div class="code">${esc(courseCode(c))} <span class="hint">CRN ${esc(c.crn||"—")}</span></div>
        <div class="title">${esc(c.title)}</div>
        <div class="subm">${num(c.credits)} cr · ${esc(meetingStr(c))}${c.instructor?' · '+esc(c.instructor):''}</div>`;
      const dt=el('<div class="row" style="margin-top:6px"></div>');
      DIVISIONS.forEach(d=>{
        const on=(c.divisions||[]).includes(d.id);
        const b=el('<button class="divtoggle'+(on?' on'+d.id.slice(1):'')+'">'+d.id+'</button>');
        b.title="Tag as "+d.name;
        b.addEventListener('click',()=>{ c.divisions=c.divisions||[]; if(on)c.divisions=c.divisions.filter(x=>x!==d.id); else c.divisions.push(d.id); render(); });
        dt.appendChild(b);
      });
      left.appendChild(dt);
      const right=el('<div class="row" style="align-items:flex-start"></div>');
      right.appendChild(mkBtn("Add to term…","ghost sm",()=>openAddToTermModal(c)));
      right.appendChild(mkBtn("Mark taken","ghost sm",()=>{ markTaken(c); }));
      const del=mkBtn("×","danger sm",()=>{ if(confirm("Delete "+courseCode(c)+" from catalog?")){ delete state.catalog[c.crn]; state.terms.forEach(t=>t.courseCrns=(t.courseCrns||[]).filter(x=>x!==c.crn)); render(); }});
      right.appendChild(del);
      row.appendChild(left); row.appendChild(right);
      list.appendChild(row);
    });
    if(!shown.length && cat.length) list.appendChild(el('<div class="empty">No matches</div>'));
  };
  wrap.appendChild(list);
  view.appendChild(wrap);
  const si=document.getElementById("catSearch");
  if(si){ si.addEventListener('input', e=>renderList(e.target.value)); }
  renderList("");
}
function markTaken(c){
  state.transcript.push({ id:uid(), subject:c.subject, number:c.number, title:c.title, credits:num(c.credits), grade:"", divisions:(c.divisions||[]).slice() });
  toast(courseCode(c)+" added to transcript"); render();
}

/* ---- Data ---- */
function renderData(){
  const wrap=el('<div></div>');
  wrap.appendChild(el('<div class="section-title"><h2>Your data</h2></div>'));

  // student
  const s=state.student;
  const prof=el('<div class="card" style="padding:14px;margin-bottom:16px"></div>');
  prof.innerHTML='<h3 style="margin-bottom:10px">Profile</h3>';
  const grid=el('<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px"></div>');
  grid.appendChild(fieldInput("Name", s.name, v=>{ s.name=v; }));
  grid.appendChild(fieldInput("Major(s)", s.majors, v=>{ s.majors=v; }));
  const yr=el('<label class="field"><span>Class standing</span></label>');
  const ysel=el('<select></select>'); ["Freshman","Sophomore","Junior","Senior"].forEach(o=>{ const op=el('<option>'+o+'</option>'); if(o===s.classYear)op.selected=true; ysel.appendChild(op); });
  ysel.addEventListener('change',e=>{ s.classYear=e.target.value; save(); });
  yr.appendChild(ysel); grid.appendChild(yr);
  grid.appendChild(fieldInput("Credits needed to graduate", s.creditsNeeded, v=>{ s.creditsNeeded=num(v,120); render(); }, "number"));
  prof.appendChild(grid);
  wrap.appendChild(prof);

  // transcript
  const tr=el('<div class="card" style="padding:14px;margin-bottom:16px"></div>');
  tr.innerHTML='<div class="row spread"><h3>Transcript — courses already taken</h3><span class="hint">'+state.transcript.length+' course(s) · '+earnedCredits()+' credits</span></div>';
  tr.appendChild(el('<label class="field" style="margin-top:10px"><span>Paste transcript rows (one course per line: CODE  TITLE  CREDITS  GRADE)</span><textarea id="trBox" rows="4" placeholder="BUSI 210  ACCOUNTING  3  A&#10;ECON 100  PRINCIPLES OF ECONOMICS  4  B+"></textarea></label>'));
  const trb=el('<div class="row" style="margin:10px 0"></div>');
  trb.appendChild(mkBtn("Import transcript rows","btn",()=>{
    const recs=parseTranscript(document.getElementById("trBox").value);
    if(!recs.length){ toast("Couldn’t parse any rows"); return; }
    state.transcript.push(...recs); document.getElementById("trBox").value=""; toast(recs.length+" course(s) added"); render();
  }));
  tr.appendChild(trb);

  if(state.transcript.length){
    const tl=el('<div style="display:flex;flex-direction:column;gap:6px"></div>');
    state.transcript.forEach(t=>{
      const r=el('<div class="pickitem"></div>');
      r.innerHTML=`<div><span class="code mono" style="font-weight:600">${esc(t.subject+" "+t.number)}</span> <span class="hint">${esc(t.title)}</span></div>`;
      const rr=el('<div class="row"></div>');
      rr.appendChild(el('<span class="pill mono">'+num(t.credits)+' cr</span>'));
      const gi=el('<input value="'+esc(t.grade||"")+'" placeholder="grade" style="width:64px;padding:3px 6px">');
      gi.addEventListener('change',e=>{ t.grade=e.target.value.trim().toUpperCase(); render(); });
      rr.appendChild(gi);
      DIVISIONS.forEach(d=>{ const on=(t.divisions||[]).includes(d.id);
        const b=el('<button class="divtoggle'+(on?' on'+d.id.slice(1):'')+'">'+d.id+'</button>');
        b.addEventListener('click',()=>{ t.divisions=t.divisions||[]; if(on)t.divisions=t.divisions.filter(x=>x!==d.id); else t.divisions.push(d.id); render(); });
        rr.appendChild(b); });
      rr.appendChild(mkBtn("×","danger sm",()=>{ state.transcript=state.transcript.filter(x=>x.id!==t.id); render(); }));
      r.appendChild(rr); tl.appendChild(r);
    });
    tr.appendChild(tl);
  }
  wrap.appendChild(tr);

  // import/export
  const io=el('<div class="card" style="padding:14px;margin-bottom:16px"></div>');
  io.innerHTML='<h3 style="margin-bottom:6px">Backup &amp; restore</h3><p class="hint" style="margin:0 0 10px">Your plan lives in this browser. Export a file to back it up or move it to another device.</p>';
  const iob=el('<div class="row"></div>');
  iob.appendChild(mkBtn("Export JSON","ghost",exportJSON));
  const imp=el('<label class="btn ghost sm" style="cursor:pointer">Import JSON<input type="file" accept="application/json" style="display:none"></label>');
  imp.querySelector('input').addEventListener('change',importJSON);
  iob.appendChild(imp);
  iob.appendChild(mkBtn("Reset everything","danger",()=>{ if(confirm("Erase all data and start fresh?")){ state=seedState(); render(); }}));
  io.appendChild(iob);
  wrap.appendChild(io);

  // help
  wrap.appendChild(el(`<details class="help"><summary>How to use this planner</summary>
    <ul>
      <li><b>Catalog tab</b> — paste course listings copied from courses.rice.edu. Tag each with D1/D2/D3 so division progress is tracked.</li>
      <li><b>Plan tab</b> — add courses into each term. Watch credit loads and red conflict flags.</li>
      <li><b>Week tab</b> — see any term as a weekly grid, and check which weekdays are class-free for work/internship time.</li>
      <li><b>Requirements tab</b> — track the 120-credit total, division targets, and any custom requirement groups (e.g. “Major core — 30 credits”).</li>
      <li><b>Data tab</b> — add your transcript so completed courses count toward requirements and division credits.</li>
    </ul></details>`));
  view.appendChild(wrap);
}

/* ---------------- Modals ---------------- */
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }
function openModal(title, bodyEl){
  const root=document.getElementById("modalRoot");
  const ov=el('<div class="overlay"></div>');
  const m=el('<div class="modal"></div>');
  const h=el('<div class="modal-head"><h3>'+esc(title)+'</h3></div>');
  h.appendChild(mkBtn("Close","ghost sm",closeModal));
  const b=el('<div class="modal-body"></div>'); b.appendChild(bodyEl);
  m.appendChild(h); m.appendChild(b); ov.appendChild(m); root.appendChild(ov);
  ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); });
}
function openAddCourseModal(term){
  const body=el('<div></div>');
  body.appendChild(el('<p class="hint" style="margin:0">Add a catalog course to <b>'+esc(term.name)+'</b>. Import more in the Catalog tab.</p>'));
  const search=el('<input placeholder="Search…">'); body.appendChild(search);
  const listWrap=el('<div class="picklist"></div>'); body.appendChild(listWrap);
  const cat=Object.values(state.catalog).sort((a,b)=>courseCode(a).localeCompare(courseCode(b)));
  const draw=(q)=>{
    listWrap.innerHTML="";
    const ql=(q||"").toLowerCase();
    const inTerm=new Set(term.courseCrns||[]);
    const shown=cat.filter(c=> !ql || (courseCode(c)+" "+c.title).toLowerCase().includes(ql));
    if(!shown.length){ listWrap.appendChild(el('<div class="hint" style="padding:8px">No courses. Import some in the Catalog tab.</div>')); return; }
    shown.forEach(c=>{
      const it=el('<div class="pickitem"></div>');
      it.innerHTML=`<div><span class="code mono" style="font-weight:600;color:var(--ink)">${esc(courseCode(c))}</span> <span class="hint">${esc(c.title)}</span><br><span class="subm hint mono">${num(c.credits)} cr · ${esc(meetingStr(c))}</span></div>`;
      if(inTerm.has(c.crn)) it.appendChild(el('<span class="pill good">added</span>'));
      else it.appendChild(mkBtn("Add","btn sm",()=>{ term.courseCrns=term.courseCrns||[]; term.courseCrns.push(c.crn); toast(courseCode(c)+" added to "+term.name); render(); draw(search.value); }));
      listWrap.appendChild(it);
    });
  };
  search.addEventListener('input',e=>draw(e.target.value)); draw("");
  openModal("Add course to "+term.name, body);
}
function openAddToTermModal(course){
  const body=el('<div></div>');
  body.appendChild(el('<p class="hint" style="margin:0">Add <b>'+esc(courseCode(course))+'</b> to which term?</p>'));
  const listWrap=el('<div class="picklist"></div>');
  if(!state.terms.length) listWrap.appendChild(el('<div class="hint">No terms yet — add one in the Plan tab.</div>'));
  state.terms.forEach(t=>{
    const it=el('<div class="pickitem"></div>');
    const has=(t.courseCrns||[]).includes(course.crn);
    it.innerHTML='<div><b>'+esc(t.name)+'</b> <span class="hint">'+termCredits(t)+' cr</span></div>';
    if(has) it.appendChild(el('<span class="pill good">already in</span>'));
    else it.appendChild(mkBtn("Add here","btn sm",()=>{ t.courseCrns=t.courseCrns||[]; t.courseCrns.push(course.crn); toast("Added to "+t.name); closeModal(); render(); }));
    listWrap.appendChild(it);
  });
  body.appendChild(listWrap);
  openModal("Add to term", body);
}
function openReqModal(existing){
  const r = existing || { id:uid(), name:"", kind:"credits", need:12, match:{subjects:[],divisions:[],courses:[]} };
  const isNew=!existing;
  const body=el('<div></div>');
  const nameI=fieldInput("Requirement name", r.name, v=>{}); body.appendChild(nameI);
  const kindWrap=el('<label class="field"><span>Measured in</span></label>');
  const kindSel=el('<select><option value="credits">Credit hours</option><option value="courses">Number of courses</option></select>');
  kindSel.value=r.kind; kindWrap.appendChild(kindSel); body.appendChild(kindWrap);
  const needI=fieldInput("How many needed", r.need, v=>{}, "number"); body.appendChild(needI);
  const subjI=fieldInput("Match subjects (comma-separated, e.g. BUSI, ECON)", (r.match.subjects||[]).join(", "), v=>{}); body.appendChild(subjI);
  const courseI=fieldInput("Or specific courses (e.g. BUSI 305, STAT 310)", (r.match.courses||[]).join(", "), v=>{}); body.appendChild(courseI);
  const divWrap=el('<div class="field"><span class="hint">Or match a division</span><div class="row" id="reqDivs"></div></div>');
  const chosen=new Set(r.match.divisions||[]);
  DIVISIONS.forEach(d=>{ const on=chosen.has(d.id); const b=el('<button class="divtoggle'+(on?' on'+d.id.slice(1):'')+'">'+d.id+'</button>');
    b.addEventListener('click',()=>{ if(chosen.has(d.id)){chosen.delete(d.id); b.className="divtoggle";} else {chosen.add(d.id); b.className="divtoggle on"+d.id.slice(1);} });
    divWrap.querySelector('#reqDivs').appendChild(b); });
  body.appendChild(divWrap);
  body.appendChild(el('<p class="hint" style="margin:0">Leave everything blank to match <b>all</b> courses (useful for a total-credits rule).</p>'));
  const save1=mkBtn(isNew?"Add requirement":"Save changes","btn",()=>{
    r.name=nameI.querySelector('input').value.trim()||"Requirement";
    r.kind=kindSel.value; r.need=num(needI.querySelector('input').value,0);
    const subs=subjI.querySelector('input').value.split(",").map(x=>x.trim().toUpperCase()).filter(Boolean);
    const crs=courseI.querySelector('input').value.split(",").map(x=>x.trim().toUpperCase()).filter(Boolean);
    r.match={ subjects:subs, courses:crs, divisions:[...chosen] };
    if(!subs.length && !crs.length && !chosen.size) r.match.any=true;
    if(isNew) state.requirements.push(r);
    closeModal(); render();
  });
  body.appendChild(save1);
  openModal(isNew?"New requirement":"Edit requirement", body);
}

/* ---------------- small factories ---------------- */
function mkBtn(label, cls, fn){ const b=el('<button class="btn '+(cls||"")+'">'+label+'</button>'); b.addEventListener('click',fn); return b; }
function fieldInput(label, val, onChange, type){
  const l=el('<label class="field"><span>'+esc(label)+'</span></label>');
  const i=el('<input '+(type==="number"?'type="number"':'')+' value="'+esc(val==null?"":val)+'">');
  i.addEventListener('change',e=>{ onChange(e.target.value); if(!document.getElementById("modalRoot").contains(i)) save(); });
  l.appendChild(i); return l;
}
function addTerm(){
  const last=state.terms[state.terms.length-1];
  let name="New Term";
  if(last){ const m=last.name.match(/(Fall|Spring|Summer)\s+(\d{4})/i);
    if(m){ const yr=parseInt(m[2],10); if(/fall/i.test(m[1])) name="Spring "+(yr+1); else if(/spring/i.test(m[1])) name="Fall "+yr; else name="Fall "+yr; } }
  state.terms.push({id:uid(), name, targetCredits:15, courseCrns:[]}); render();
}

/* ---------------- import/export ---------------- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="rice-course-plan.json"; a.click(); URL.revokeObjectURL(url);
  toast("Exported");
}
function importJSON(e){
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ state=JSON.parse(rd.result); migrate(); render(); toast("Imported"); }catch(err){ toast("Invalid file"); } };
  rd.readAsText(f);
}

/* ---------------- theme ---------------- */
function toggleTheme(){
  const root=document.documentElement;
  const cur=root.getAttribute("data-theme");
  const sysDark=window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const next = cur ? (cur==="dark"?"light":"dark") : (sysDark?"light":"dark");
  root.setAttribute("data-theme", next);
  try{ localStorage.setItem(STORAGE_KEY+".theme", next); }catch(e){}
}
(function initTheme(){ try{ const t=localStorage.getItem(STORAGE_KEY+".theme"); if(t) document.documentElement.setAttribute("data-theme",t); }catch(e){} })();

/* ---------------- wire up ---------------- */
document.getElementById("tabs").addEventListener("click", e=>{
  const b=e.target.closest(".tab"); if(!b) return; state.ui.tab=b.dataset.tab; render();
});
document.querySelector('[data-action="toggle-theme"]').addEventListener("click", toggleTheme);
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

load(); render();
</script>
</body>
